<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>❤️ ใบหม่อน ❤️</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="intro">

<div class="intro-box">

<h1>❤️ ถึงใบหม่อน ❤️</h1>

<p>
From เติ้ล (สุรชัย ศรเพ็ชร)
</p>

<p>
To ใบหม่อน (นางสาวโสภิศนภา เตจา)
</p>

<button onclick="startLove()">
💖 กดเพื่อเข้าสู่ความทรงจำ
</button>

</div>

</div>

<div id="main">

<div id="hearts"></div>
<div id="particles"></div>

<div class="music-controls-container" style="position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; gap: 10px; align-items: center;">
    <button onclick="volumeDown()" style="background: rgba(255, 255, 255, 0.8); border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">🔉</button>
    
    <div class="musicBtn" onclick="toggleMusic()" style="position: static; margin: 0; background: rgba(255, 255, 255, 0.8); border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
        🎵
    </div>
    
    <button onclick="volumeUp()" style="background: rgba(255, 255, 255, 0.8); border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">🔊</button>
</div>
<div class="container">

<h1 class="title">
❤️ OUR LOVE ❤️
</h1>

<div id="counter"></div>

<div class="slider">

<img src="img1.jpg" class="slide active">

<img src="img2.jpg" class="slide">

<img src="img3.jpg" class="slide">

<img src="img4.jpg" class="slide">

</div>

<div class="messageBox">

<p id="loveText">
ขอบคุณที่เข้ามาเป็นความสุขในทุกวันของเค้า ❤️
</p>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
